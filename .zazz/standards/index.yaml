# .zazz/standards/index.yaml
#
# Zgraphify's active standards-routing index. Every applies_to.paths value is
# relative to this repository root. The documents themselves are vendored Zazz
# baselines; use standard-builder before adding a stack-specific rule.
standards:
  - file: code-structure.md
    tier: methodology
    applies_to:
      paths:
        - graphify/
        - tests/
        - tools/
        - .agents/skills/
        - .zazz/standards/
      activities:
        - creating or modifying authored Python code, tests, tooling, standards, or agent skills
        - reviewing module cohesion, file size, duplication, or computation reuse
    purpose: >-
      Module cohesion, contextual splitting, incrementally discoverable guidance,
      anti-slop structure, and compute-once patterns.

  - file: agent-skills.md
    tier: methodology
    applies_to:
      paths:
        - .agents/skills/
      activities:
        - creating or modifying a shared agent skill
        - editing SKILL.md metadata, references, scripts, or assets
    purpose: >-
      Portable agent-skill structure, discoverability, progressive disclosure, and
      validation rules.

  - file: docs-hygiene.md
    tier: methodology
    applies_to:
      paths:
        - .zazz/
        - .agents/skills/
        - AGENTS.md
        - README.md
        - ARCHITECTURE.md
        - CHANGELOG.md
      activities:
        - authoring or editing Markdown, standards, or agent guides
        - documenting external tools, services, or cross-document links
    purpose: >-
      Documentation voice, link style, cleanup discipline, guide structure, and
      durable-document hygiene.

  - file: docs-hygiene-reference-structure.md
    tier: methodology
    applies_to:
      paths:
        - .zazz/standards/
      activities:
        - authoring or reviewing a standards document
        - adding citations or restructuring standards guidance
    purpose: >-
      Standards-document section structure, citation conventions, and exclusions.

  - file: spec-hygiene.md
    tier: methodology
    applies_to:
      paths:
        - .zazz/specifications/
      activities:
        - authoring or revising a deliverable specification
        - reviewing a specification for portable paths, links, or completeness
    purpose: >-
      Specification portability, testable acceptance criteria, proportional test
      strategy, decisions, scope, and exclusions.

  - file: contextual-split.md
    tier: methodology
    applies_to:
      paths:
        - .zazz/standards/
      activities:
        - adding, splitting, renaming, or routing a standards document
    purpose: >-
      How to organize standards into small, task-relevant, discoverable documents.

  - file: python-testing.md
    tier: methodology
    applies_to:
      paths:
        - tests/
      activities:
        - writing or reviewing Python tests and fixtures
        - selecting verification evidence for a change
    purpose: >-
      Test purpose, naming, coverage evidence, and behavior-focused test design.

  - file: ci-workflows.md
    tier: methodology
    applies_to:
      paths:
        - .github/workflows/
      activities:
        - authoring or modifying GitHub Actions workflows
        - configuring CI triggers, permissions, or caching
    purpose: >-
      CI workflow triggers, least-privilege permissions, caches, and deployment
      workflow boundaries.

  - file: security.md
    tier: methodology
    applies_to:
      paths:
        - .github/workflows/
        - pyproject.toml
        - uv.lock
        - graphify/
      activities:
        - reviewing dependencies, workflow permissions, secrets, or supply-chain risk
        - remediating a security issue
    purpose: >-
      Security-review evidence, scoped secrets, workflow permissions, and dependency
      remediation hygiene.

  - file: deployment.md
    tier: methodology
    applies_to:
      paths:
        - Dockerfile
        - .github/workflows/
        - pyproject.toml
      activities:
        - modifying packaging, Docker, release, or deployment configuration
    purpose: >-
      Deployment and packaging review boundaries. Apply only after checking that the
      generic baseline matches this project's release process.

  - file: tooling-lint-format.md
    tier: methodology
    applies_to:
      paths:
        - pyproject.toml
        - uv.lock
      activities:
        - modifying Python tooling, lint, formatting, typing, or test configuration
    purpose: >-
      Tooling and configuration hygiene. Apply only where its generic guidance fits
      the repository's declared uv-based workflow.

  - file: pr-process.md
    tier: methodology
    applies_to:
      paths: []
      activities:
        - opening, reviewing, or scoping a pull request
        - deciding whether work belongs in a separate change
    purpose: >-
      One-logical-change PR scope, review evidence, titles, and repository hygiene.
